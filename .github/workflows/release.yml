name: Build (artifacts only)

# 推 v* tag 或手動觸發 → 四平台打包,artifact 上傳到 Actions(供本機 gh run download 做個人完整包)。
# ⚠ [HARD] 刻意「不建 GitHub Release、不上傳任何二進位/完整包」到公開頁面。
#   L.CY 指示:GitHub 只公開「程式碼」;編譯產物與含版權原版 gamedata 的完整包一律本機自留、不對外散布。
#   要標版本用 git tag(GitHub 自動附的 Source code 是純原始碼 archive,不含 build 產物/gamedata)。
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read   # 只讀:build+upload-artifact 不需 write;移除建 Release 的權限,杜絕誤上傳

jobs:
  linux-appimage:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: 安裝建置依賴(SDL2_gfx 已 vendored,不需系統套件)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config wget file fuse libfuse2 \
            libsdl2-dev libsdl2-image-dev libsdl2-ttf-dev libsdl2-mixer-dev \
            nlohmann-json3-dev
      - name: 建 AppImage
        run: bash packaging/build-appimage.sh
      - uses: actions/upload-artifact@v4
        with:
          name: Ultima1-CHT-linux-appimage
          path: dist/*.AppImage

  windows:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: 安裝 MinGW 交叉工具
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            g++-mingw-w64-x86-64 mingw-w64-tools cmake make pkg-config wget zip
      - name: 交叉編譯 Windows 包
        run: bash packaging/build-windows.sh
      - uses: actions/upload-artifact@v4
        with:
          name: Ultima1-CHT-windows-x64
          path: dist/Ultima1-CHT-windows-x64.zip

  macos:
    # u4-cht 證實的雙 runner 矩陣:各建單一架構(universal 在單 runner 上自編 vendored
    # 相依太慢,>30min;改每 arch 一台 runner 平行,各自單架構較快較穩)。
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40   # 護欄:從源碼編 SDL 卡住時快速失敗,別卡到預設 6 小時
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14         # Apple Silicon
            arch: arm64
          - os: macos-15-intel   # Intel(macos-13 已 2025-12-04 退役)
            arch: x86_64
    steps:
      - uses: actions/checkout@v4
      - name: 安裝工具(SDL2 從源碼自編,不裝 brew sdl2)
        run: brew install cmake pkg-config dylibbundler
      - name: 建 macOS .app(${{ matrix.arch }})
        env:
          MAC_ARCH: ${{ matrix.arch }}
        run: bash packaging/build-macos.sh
      - uses: actions/upload-artifact@v4
        with:
          name: Ultima1-CHT-macos-${{ matrix.arch }}
          path: dist/Ultima1-CHT-macos-${{ matrix.arch }}.zip

  # (刻意移除 release job)不自動建 GitHub Release、不上傳二進位/完整包。理由見檔頭 [HARD]。
  # 需要成品時:本機 `gh run download <run>` 抓 artifact,再 packaging/make_complete_backup.sh 注入 gamedata。
